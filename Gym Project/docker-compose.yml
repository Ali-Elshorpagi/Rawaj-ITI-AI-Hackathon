version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: gymdesk_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: gymdesk
      MONGO_INITDB_ROOT_PASSWORD: gymdesk_secret
      MONGO_INITDB_DATABASE: gymdesk
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - gymdesk_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: gymdesk_api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://gymdesk:gymdesk_secret@mongodb:27017/gymdesk?authSource=admin
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EMAIL_SECRET: ${JWT_EMAIL_SECRET}
      JWT_RESET_SECRET: ${JWT_RESET_SECRET}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:4200}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4200}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PUSHER_APP_ID: ${PUSHER_APP_ID}
      PUSHER_KEY: ${PUSHER_KEY}
      PUSHER_SECRET: ${PUSHER_SECRET}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-eu}
    ports:
      - "5000:5000"
    volumes:
      - backend_logs:/app/logs
    networks:
      - gymdesk_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-http://localhost:5000/api/v1}
    container_name: gymdesk_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"
    networks:
      - gymdesk_network

  # ── Mongo Express (Dev only) ─────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: gymdesk_mongo_express
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: gymdesk
      ME_CONFIG_MONGODB_ADMINPASSWORD: gymdesk_secret
      ME_CONFIG_MONGODB_URL: mongodb://gymdesk:gymdesk_secret@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - gymdesk_network
    profiles:
      - dev

networks:
  gymdesk_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  backend_logs:
    driver: local

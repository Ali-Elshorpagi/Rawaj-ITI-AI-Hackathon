<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800" fill="none">
  <defs>
    <style>
      .title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111111; }
